{% extends 'base.html' %}
{% block title %}Edit Equipment{% endblock %}
{% block content %}
<section class="page-intro">
    <span class="eyebrow">Producer Module</span>
    <h1>Edit Equipment</h1>
    <p>Update inventory details, pricing, stock count, or replace the image.</p>
</section>

<section class="panel form-panel">
    <form method="POST" enctype="multipart/form-data" class="validated-form">
        <div class="grid-two">
            <div class="field">
                <label for="name">Equipment Name</label>
                <input type="text" name="name" id="name" value="{{ equipment.name }}" required>
            </div>
            <div class="field">
                <label for="rent_per_day">Rent per Day (Rs.)</label>
                <input type="number" step="0.01" name="rent_per_day" id="rent_per_day" value="{{ equipment.rent_per_day }}" required>
            </div>
            <div class="field grid-span-2">
                <label for="description">Description</label>
                <textarea name="description" id="description" rows="4" required>{{ equipment.description }}</textarea>
            </div>
            <div class="field">
                <label for="quantity">Quantity</label>
                <input type="number" name="quantity" id="quantity" min="0" value="{{ equipment.quantity }}" required>
            </div>
            <div class="field">
                <label for="max_days">Max Rental Days</label>
                <input type="number" name="max_days" id="max_days" min="1" value="{{ equipment.max_days }}" required>
            </div>
            <div class="field">
                <label for="deposit">Security Deposit (Rs.)</label>
                <input type="number" step="0.01" name="deposit" id="deposit" min="0" value="{{ equipment.deposit }}" required>
            </div>
            <div class="field">
                <label for="image">Replace Image (Optional)</label>
                <input type="file" name="image" id="image" accept=".png,.jpg,.jpeg,.webp">
            </div>
        </div>
        <div class="card-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a class="btn btn-outline" href="{{ url_for('producer_equipment') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
