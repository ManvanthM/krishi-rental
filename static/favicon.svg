<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green background -->
  <rect width="64" height="64" rx="14" fill="#2e7d32"/>
  <!-- Tractor body scaled to fit 64x64 -->
  <!-- Rear large wheel -->
  <circle cx="20" cy="44" r="13" stroke="#f1f8e9" stroke-width="3" fill="none"/>
  <circle cx="20" cy="44" r="5" fill="#f1f8e9" opacity="0.55"/>
  <!-- Rear spokes -->
  <line x1="20" y1="31" x2="20" y2="36" stroke="#f1f8e9" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="52" x2="20" y2="57" stroke="#f1f8e9" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="7"  y1="44" x2="12" y2="44" stroke="#f1f8e9" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28" y1="44" x2="33" y2="44" stroke="#f1f8e9" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="11" y1="35" x2="14" y2="39" stroke="#f1f8e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="49" x2="29" y2="53" stroke="#f1f8e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="35" x2="26" y2="39" stroke="#f1f8e9" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="49" x2="11" y2="53" stroke="#f1f8e9" stroke-width="2" stroke-linecap="round"/>
  <!-- Front small wheel -->
  <circle cx="52" cy="48" r="8"  stroke="#f1f8e9" stroke-width="3" fill="none"/>
  <circle cx="52" cy="48" r="3"  fill="#f1f8e9" opacity="0.5"/>
  <!-- Tractor body / chassis -->
  <path d="M33 44 H58 V38 H52 L46 26 H33 V44 Z" stroke="#f1f8e9" stroke-width="2.5" stroke-linejoin="round" fill="rgba(255,255,255,0.08)"/>
  <!-- Engine hood -->
  <rect x="33" y="26" width="13" height="10" rx="2" stroke="#f1f8e9" stroke-width="2.2" fill="none"/>
  <!-- Exhaust pipe -->
  <path d="M46 26 V16" stroke="#f1f8e9" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M43 16 H49" stroke="#f1f8e9" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cab -->
  <rect x="35" y="28" width="10" height="8" rx="1.5" stroke="#f1f8e9" stroke-width="2" fill="rgba(249,168,37,0.3)"/>
  <!-- Wheat accent dot -->
  <circle cx="40" cy="32" r="1.8" fill="#f9a825" opacity="0.9"/>
</svg>
